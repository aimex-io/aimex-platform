services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: aimex
      POSTGRES_PASSWORD: aimex
      POSTGRES_DB: aimex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimex -d aimex"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://aimex:aimex@db:5432/aimex
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - aimex-data:/paperclip
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  aimex-data:
